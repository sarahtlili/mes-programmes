<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f8f7f4">
<title>Mes programmes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f8f7f4 0%, #efece4 100%);
    color: #2d2d2d;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    width: 100%;
    max-width: 440px;
  }
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 800;
    color: #1a1a1a;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .header p {
    font-size: 15px;
    color: #888;
  }
  .card {
    display: block;
    text-decoration: none;
    background: #fff;
    border: 1px solid #eae7e0;
    border-radius: 20px;
    padding: 24px 22px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    color: inherit;
  }
  .card:active {
    transform: scale(0.98);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .card-inner {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-icon svg {
    width: 28px;
    height: 28px;
  }
  .card-icon.food { background: #fff3e0; color: #e65100; }
  .card-icon.sport { background: #e3f2fd; color: #1565c0; }
  .card-body { flex: 1; min-width: 0; }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 3px;
  }
  .card-sub {
    font-size: 13px;
    color: #888;
  }
  .card-arrow {
    color: #ccc;
    font-size: 22px;
    flex-shrink: 0;
  }
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: #aaa;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Mes programmes</h1>
    <p>Choisis ce que tu veux consulter</p>
  </div>

  <a href="alimentaire.html" class="card">
    <div class="card-inner">
      <div class="card-icon food">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 2v7.527a2 2 0 0 1-.211.896L7.4 17.1A2 2 0 0 0 9.188 20h5.625a2 2 0 0 0 1.787-2.9l-3.389-6.677A2 2 0 0 1 13 9.527V2"/>
          <path d="M8 2h8"/>
          <path d="M7.5 14h9"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">Programme alimentaire</div>
        <div class="card-sub">Repas, timing et conseils</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <a href="sport.html" class="card">
    <div class="card-inner">
      <div class="card-icon sport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.596 12.768a2 2 0 1 0 2.829-2.829l-1.768-1.767a2 2 0 0 0 2.828-2.829l-2.828-2.828a2 2 0 0 0-2.829 2.828l-1.767-1.768a2 2 0 1 0-2.829 2.829z"/>
          <path d="m2.5 21.5 1.4-1.4"/>
          <path d="m20.1 3.9 1.4-1.4"/>
          <path d="M5.343 21.485a2 2 0 1 0 2.829-2.828l1.767 1.768a2 2 0 1 0 2.829-2.829l-6.364-6.364a2 2 0 1 0-2.829 2.829l1.768 1.767a2 2 0 0 0-2.828 2.829z"/>
          <path d="m9.6 14.4 4.8-4.8"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-title">Fiche sport</div>
        <div class="card-sub">Circuit Biocircuit + etirements</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
  </a>

  <div class="footer">Ajoute cette page a ton ecran d'accueil pour un acces rapide</div>
</div>

</body>
</html>
